name: Publish NuGet Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_PATH: src/Mol.Format/Mol.Format.csproj
  TEST_PROJECT_PATH: tests/Mol.Format.Tests/Mol.Format.Tests.csproj
  PACKAGE_OUTPUT: artifacts

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Read package version
        id: package_version
        shell: bash
        run: |
          version="$(grep -oPm1 '(?<=<Version>)[^<]+' "$PROJECT_PATH")"
          if [ -z "$version" ]; then
            echo "Could not read <Version> from $PROJECT_PATH" >&2
            exit 1
          fi

          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="${{ steps.package_version.outputs.value }}"

          if [ "$tag_version" != "$package_version" ]; then
            echo "Tag version $tag_version does not match package version $package_version" >&2
            exit 1
          fi

      - name: Restore
        run: dotnet restore Mol.Format.sln

      - name: Build
        run: dotnet build Mol.Format.sln -c Release --no-restore

      - name: Test
        run: dotnet test "$TEST_PROJECT_PATH" -c Release --no-restore

      - name: Pack
        run: dotnet pack "$PROJECT_PATH" -c Release --no-build -o "$PACKAGE_OUTPUT"

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: nuget-package
          path: artifacts/*.nupkg

      - name: Publish to NuGet
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "Repository secret NUGET_API_KEY is required." >&2
            exit 1
          fi

          dotnet nuget push "$PACKAGE_OUTPUT"/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
